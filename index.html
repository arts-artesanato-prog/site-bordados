<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts & Artesanato</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --off-white: #fcfcfc;
            --palha: #f2ede4;
            --chumbo: #2c2c2c;
            --rosa: #e9cfcd;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--off-white);
            color: var(--chumbo);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        header { padding: 40px 20px; background: var(--palha); }
        .logo { width: 120px; height: 120px; border-radius: 50%; background: white; border: 1px solid var(--rosa); margin-bottom: 15px; object-fit: cover; }
        
        .btn-orcamento {
            display: inline-block;
            margin: 30px 0;
            background-color: var(--chumbo);
            color: white;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .secao { max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: left; }
        .titulo { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 15px; border-bottom: 1px solid var(--rosa); padding-bottom: 10px; }

        /* Container do Carrossel */
        .carousel { width: 100%; border-radius: 12px; overflow: hidden; background: white; position: relative; min-height: 300px; }
        .track { display: flex; transition: transform 0.6s ease-in-out; }
        .track img { width: 100%; height: auto; display: block; flex-shrink: 0; }

        footer { background-color: var(--chumbo); color: white; padding: 40px 20px; margin-top: 60px; }
        .redes { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .redes a { font-size: 2.5rem; text-decoration: none; }
        
        /* Cores Originais Fixas */
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }

        footer p { font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <img src="png/logo/logo.png" alt="Logo" class="logo">
        <h1 style="font-family: 'Playfair Display';">Arts & Artesanato</h1>
    </header>

    <a href="https://wa.me/5535991496337?text=Olá! Gostaria de fazer meu orçamento!" class="btn-orcamento">
        Olá! Gostaria de fazer meu orçamento!
    </a>

    <div id="vitrine">
        </div>

    <footer>
        <div class="redes">
            <a href="https://www.instagram.com/arts_artesanato_/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61577553669249" target="_blank"><i class="fab fa-facebook"></i></a>
        </div>
        <p>Poços de Caldas - MG | Enviamos para todo Brasil</p>
        <p>© 2026 Arts & Artesanato</p>
    </footer>

    <script>
        // CONFIGURAÇÃO AUTOMÁTICA DO GITHUB
        const conta = 'arts-artesanato-prog';
        const repo = 'site-bordados';
        
        const categorias = [
            { nome: "🧼 Toalinhas", pasta: "bordado" },
            { nome: "🍼 Enxoval", pasta: "enxoval" },
            { nome: "👕 Roupas Personalizadas", pasta: "roupas" },
            { nome: "🎀 Enfeites Personalizados", pasta: "enfeites" }
        ];

        async function carregarImagens() {
            const vitrine = document.getElementById('vitrine');

            for (const cat of categorias) {
                try {
                    // API do GitHub que lê a pasta automaticamente
                    const url = `https://api.github.com/repos/${conta}/${repo}/contents/png/${cat.pasta}`;
                    const resposta = await fetch(url);
                    const arquivos = await resposta.json();
                    
                    // Pega apenas arquivos de imagem
                    const imagens = arquivos.filter(arq => arq.name.match(/\.(png|jpg|jpeg|webp)$/i));

                    if (imagens.length > 0) {
                        const divCat = document.createElement('div');
                        divCat.className = 'secao';
                        
                        const idTrack = `track-${cat.pasta}`;
                        let htmlImagens = imagens.map(img => `<img src="${img.download_url}">`).join('');

                        divCat.innerHTML = `
                            <div class="titulo">${cat.nome}</div>
                            <div class="carousel">
                                <div class="track" id="${idTrack}">${htmlImagens}</div>
                            </div>
                        `;
                        vitrine.appendChild(divCat);

                        // Inicia o movimento automático
                        iniciarCarrossel(idTrack, imagens.length);
                    }
                } catch (e) { console.error("Erro na pasta " + cat.pasta); }
            }
        }

        function iniciarCarrossel(id, total) {
            let index = 0;
            const track = document.getElementById(id);
            setInterval(() => {
                index++;
                if (index >= total) index = 0;
                track.style.transform = `translateX(-${index * 100}%)`;
            }, 4000); // 4 segundos por foto
        }

        carregarImagens();
    </script>
</body>
</html>
